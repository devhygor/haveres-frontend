  <!-- Line -->
  <path d="M 690 420 L 730 408 L 775 414 L 820 395 L 865 375 L 910 355 L 955 330 L 1000 308 L 1045 282 L 1090 258 L 1120 240"
        fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Last point dot -->
  <circle cx="1120" cy="240" r="5" fill="#3b82f6"/>
  <circle cx="1120" cy="240" r="9" fill="#3b82f6" fill-opacity="0.2"/>

  <!-- Chart x-axis base -->
  <rect x="690" y="450" width="450" height="1" fill="#2d3748"/>

  <!-- ── ASSETS LIST ── -->
  <!-- Row 1 -->
  <text x="690" y="482" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white">PETR4</text>
  <text x="690" y="498" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">Petróleo Brasileiro</text>
  <text x="1120" y="488" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#22c55e" text-anchor="end">+8,2%</text>

  <!-- Row 2 -->
  <text x="690" y="524" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white">KNRI11</text>
  <text x="690" y="540" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">Kinea Renda Imobiliária</text>
  <text x="1120" y="530" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#22c55e" text-anchor="end">+5,1%</text>

  <!-- Row 3 -->
  <text x="690" y="562" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white">BOVA11</text>
  <text x="690" y="578" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">iShares Ibovespa ETF</text>
  <text x="1120" y="568" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ef4444" text-anchor="end">-1,3%</text>
</svg>
