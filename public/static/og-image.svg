<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <clipPath id="cardClip">
      <rect x="650" y="60" width="490" height="510" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#glowBg)"/>

  <!-- Subtle glow circles -->
  <circle cx="200" cy="600" r="350" fill="#3b82f6" fill-opacity="0.04"/>
  <circle cx="950" cy="80" r="280" fill="#3b82f6" fill-opacity="0.05"/>

  <!-- Left blue accent bar -->
  <rect x="0" y="0" width="4" height="630" fill="#3b82f6"/>

  <!-- ── LOGO ── -->
  <rect x="80" y="72" width="48" height="48" rx="12" fill="#3b82f6"/>
  <text x="104" y="106" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" fill="white" text-anchor="middle">H</text>
  <text x="142" y="106" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="white">Haveres</text>

  <!-- ── HEADLINE ── -->
  <text x="80" y="188" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="54" font-weight="800" fill="white" letter-spacing="-1">Controle sua</text>
  <text x="80" y="254" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="54" font-weight="800" letter-spacing="-1">
    <tspan fill="#3b82f6">carteira</tspan><tspan fill="white"> com</tspan>
  </text>
  <text x="80" y="320" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="54" font-weight="800" fill="white" letter-spacing="-1">inteligência</text>

  <!-- ── DESCRIPTION ── -->
  <text x="80" y="368" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="19" fill="#64748b">
    Ações · FIIs · ETFs · Renda Fixa · Cripto
  </text>
  <text x="80" y="396" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="19" fill="#64748b">
    Preço médio, proventos e P&amp;L em tempo real.
  </text>

  <!-- ── FEATURE PILLS ── -->
  <!-- Pill 1 -->
  <rect x="80" y="428" width="168" height="34" rx="17" fill="#1a1f2e" stroke="#2d3748" stroke-width="1"/>
  <text x="164" y="450" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Preço Médio Auto</text>

  <!-- Pill 2 -->
  <rect x="260" y="428" width="148" height="34" rx="17" fill="#1a1f2e" stroke="#2d3748" stroke-width="1"/>
  <text x="334" y="450" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Proventos &amp; DY</text>

  <!-- Pill 3 -->
  <rect x="420" y="428" width="148" height="34" rx="17" fill="#1a1f2e" stroke="#2d3748" stroke-width="1"/>
  <text x="494" y="450" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Open Finance</text>

  <!-- ── URL ── -->
  <text x="80" y="555" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#3b82f6">haveres.app</text>
  <rect x="80" y="568" width="500" height="1" fill="#2d3748"/>
  <text x="80" y="590" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">Gratuito · Seguro · Seus dados</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- ── RIGHT CARD ── -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="650" y="60" width="490" height="510" rx="20" fill="#1a1f2e" stroke="#2d3748" stroke-width="1"/>

  <!-- Card header label -->
  <text x="690" y="115" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" letter-spacing="0.5">PATRIMÔNIO TOTAL</text>

  <!-- Card main value -->
  <text x="690" y="165" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="white">R$ 284.750</text>

  <!-- Green badge -->
  <rect x="690" y="178" width="102" height="26" rx="7" fill="#22c55e" fill-opacity="0.12"/>
  <text x="741" y="196" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">▲ +12,4% hoje</text>

  <!-- ── CHART AREA ── -->
  <!-- Area fill -->
  <path d="M 690 420 L 730 408 L 775 414 L 820 395 L 865 375 L 910 355 L 955 330 L 1000 308 L 1045 282 L 1090 258 L 1120 240 L 1120 450 L 690 450 Z"
