name: Deploy React to Proxmox LXC

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT }}

          script: |
            echo "==== 1. Entrando na pasta do projeto ===="
            cd /home/deployuser/apps/haveres/haveres-frontend

            echo "==== 2. Garantindo branch main ===="
            git checkout main

            echo "==== 3. Atualizando código ===="
            git pull origin main

            echo "==== 4. Instalando dependências ===="
            npm install

            echo "==== 5. Reiniciando frontend no PM2 ===="
            pm2 restart haveres-frontend || pm2 start "npm run dev -- --host 0.0.0.0" --name haveres-frontend

            echo "==== 6. Salvando configuração do PM2 ===="
            pm2 save

            echo "==== Deploy concluído com sucesso ===="
